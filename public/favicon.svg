<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background dark -->
  <rect width="32" height="32" rx="7" fill="#090C12"/>
  <!-- Subtle amber border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#F5A623" stroke-width="1.2" stroke-opacity="0.25"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="7.5,21 15.5,14 23.5,7.5"
    fill="none"
    stroke="#F5A623"
    stroke-width="1.2"
    stroke-opacity="0.35"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="1.5 1.5"
  />

  <!-- Bar 1 (short) -->
  <rect x="4" y="21" width="7" height="7" rx="2" fill="#F5A623" opacity="0.55"/>
  <!-- Bar 2 (medium) -->
  <rect x="12.5" y="14" width="7" height="14" rx="2" fill="#F5A623" opacity="0.78"/>
  <!-- Bar 3 (tall) -->
  <rect x="21" y="8" width="7" height="20" rx="2" fill="#F5A623"/>

  <!-- Green peak dot -->
  <circle cx="24.5" cy="6.5" r="3" fill="#00D084"/>
  <circle cx="24.5" cy="6.5" r="1.4" fill="#090C12"/>
</svg>
